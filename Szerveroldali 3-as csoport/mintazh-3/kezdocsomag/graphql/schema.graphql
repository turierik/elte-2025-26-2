scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Query {
    pizzas: [Pizza!]! @all
    pizza(id: ID! @eq): Pizza @find
    statistics: Statistics!
}

type Statistics {
    pizzaCount: Int!
    averagePizzaPrice: Float!
    favouriteTopping: Topping!
}

type Mutation {
    createTopping(input: CreateToppingInput! @spread): Topping @create
}

input CreateToppingInput {
    name: String! @rules(apply: ["unique:toppings,name"])
    price: Int! @rules(apply: ["min:1"])
}

type Customer {
    id: ID!
    name: String!
    email: String!
    password: String!
    created_at: DateTime!
    updated_at: DateTime!
}

type Pizza {
    id: ID!
    name: String
    size: Int!
    base: String!
    cheese_crust: Boolean!
    customer_id: ID!
    created_at: DateTime!
    updated_at: DateTime!
    pivot: PizzaToppingPivot!
    customer: Customer!
    toppings: [Topping!]!
    price: Int!
}

type Topping {
    id: ID!
    name: String!
    price: Int!
    created_at: DateTime!
    updated_at: DateTime!
    pivot: PizzaToppingPivot!
}

type PizzaToppingPivot {
    pizza_id: ID!
    topping_id: ID!
    amount: Int!
}
