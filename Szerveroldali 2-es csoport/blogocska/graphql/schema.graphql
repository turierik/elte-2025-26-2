"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Find a single user by an identifying attribute."
    user(
      "Search by primary key."
      id: ID @eq @rules(apply: ["prohibits:email", "required_without:email"])

      "Search by email address."
      email: String @eq @rules(apply: ["prohibits:id", "required_without:id", "email"])
    ): User @find

    "List multiple users."
    users(
      "Filters by name. Accepts SQL LIKE wildcards `%` and `_`."
      name: String @where(operator: "like")
    ): [User!]! @paginate(defaultCount: 10)

    add(x: Int!, y: Int!) : Int!
    posts: [Post!]! @all
    post(id: ID! @eq): Post @find

    latestPost: Post! @orderBy(column: "created_at", direction: DESC) @first

    hello(name: String): String!
}


type Mutation {
    createTag(name: String!, color: String!): Tag!
    createTagv2(name: String!, color: String!): Tag! @create
    createTagv3(input: CreateTagInput! @spread): Tag! @create
    deleteTag(id: ID! @whereKey): Tag! @delete
}

input CreateTagInput {
    name: String!
    color: String! @rules(apply: ["size:7"])
}

"Account of a person who uses this application."
type User {
    "Unique primary key."
    id: ID!

    "Non-unique name."
    name: String!

    "Unique email address."
    email: String!

    "When the email was verified."
    email_verified_at: DateTime

    "When the account was created."
    created_at: DateTime!

    "When the account was last updated."
    updated_at: DateTime!

    posts: [Post!]!

    postCount: Int!
}

type Post {
    id: ID!
    title: String!
    content: String!
    author_id: ID!
    created_at: DateTime!
    updated_at: DateTime!
    image_filename: String
    author: User
    length: Int!
}

type Tag {
    id: ID!
    name: String!
    color: String!
    created_at: DateTime!
    updated_at: DateTime!
}
